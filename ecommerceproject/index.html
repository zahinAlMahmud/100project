<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerace Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <ul style="display: flex; align-items: center;justify-content: center; gap: 20px; list-style: none;">
            <li><span id="cart">0</span>Add</li>
            <li><span id="list">0</span>Wishlist</li>
        </ul>
    </nav>
    <div class="container">
        <div class="card_section" id="card">
            <div class="card_image" id="image">
                <img src="https://img.magnific.com/premium-psd/blue-sport-sneakers-shoes-isolated-transparent-background-png-psd_888962-1190.jpg?semt=ais_hybrid&w=740&q=80"
                    alt="image" style="width: 100px; height: 100px; object-fit: contain;">
            </div>
            <div class="card_title" id="title">
                <h2>Sneaker Shoe <span>Blue*</span></h2>
            </div>
            <div class="card_para" id="para">
                <p>Blue sneakers give a calm, stylish vibe, perfect for casual or sporty looks.</p>
            </div>
            <div id="btn-group">
                    <button id="add"> <span class="material-symbols-outlined">
                    add_shopping_cart
                </span>Add to card</button>
            <button id="wishlist"><span class="material-symbols-outlined">
                    favorite
                </span>Add to wishlist</button>
            </div>
        </div>
        <div class="card_section" id="card">
            <div class="card_image" id="image">
                <img src="https://media.istockphoto.com/id/628210852/photo/sports-shoe.jpg?s=612x612&w=0&k=20&c=r9U6Msiwk_b2P-PJM6EBKaRTHGmeGb9ejw1QkM_DkfE="
                    alt="image" style="width: 100px; height: 100px; object-fit: contain;">
            </div>
            <div class="card_title" id="title">
                <h2>Sneaker Shoe <span id="red">Red</span></h2>
            </div>
            <div class="card_para" id="para">
                <p>Red sneakers pop with energy and confidence, making every step bold and eye-catching.</p>
            </div>
            <div id="btn-group">
                    <button id="add"> <span class="material-symbols-outlined">
                    add_shopping_cart
                </span>Add to card</button>
            <button id="wishlist"><span class="material-symbols-outlined">
                    favorite
                </span>Add to wishlist</button>
            </div>
        </div>
    </div>
</body>
<script src="index.js"></script>

</html>
