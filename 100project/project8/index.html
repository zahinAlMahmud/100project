<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Full Form </h2>
        <label for="f-name" >FirstName</label>
        <input type="text" id="text_input" name="f-name" required>
        <hr>
          <label for="l-name" >LastName</label>
        <input type="text" id="l-name" name="l-name" required>
        <hr>
          <label for="email"  >Email</label>
        <input type="email" id="email" name="email" required>
        <hr>
          <label for="address" >Address</label>
        <input type="text" id="address" name="address" required>
        <hr>
          <label for="password" >Password</label>
        <input type="password" id="password" name="password" required>
        <hr>
          <label for="c.password" >Confirm Password</label>
        <input type="password" id="c.password" name="c.password" required>
        <hr>
    </div>
    <script src="script.js"></script>
</body>
</html>
